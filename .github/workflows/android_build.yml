name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Fetch Flutter SDK Fast
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean Build Workspace & Inject Code
        run: |
          # Purana sab kuch mita kar naya clean space banao
          rm -rf ./*
          flutter create --org com.levoteam --project-name levo --platforms=android .
          
          # Direct code injection bina kisi error ke
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';

          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            title: 'levo',
            theme: ThemeData.dark().copyWith(scaffoldBackgroundColor: Colors.black),
            home: const LevoCorePage(),
          ));

          class UserData {
            String username = "levo_user";
            String region = "IN/Asia";
            String created = "26-06-2026";
            String dob = "01-01-2000";
            bool isPremium = true;
          }

          class LevoCorePage extends StatefulWidget {
            const LevoCorePage({super.key});
            @override
            State<LevoCorePage> createState() => _LevoCorePageState();
          }

          class _LevoCorePageState extends State<LevoCorePage> {
            int _tabIndex = 0;
            bool _refreshing = false;
            Color _loadColor = const Color(0xFF00E5FF);
            final UserData user = UserData();

            void runRefresh() async {
              setState(() => _refreshing = true);
              await Future.delayed(const Duration(milliseconds: 1000));
              if (mounted) setState(() => _refreshing = false);
            }

            @override
            Widget build(BuildContext context) {
              final List<Widget> bodyTabs = [
                GestureDetector(onDoubleTap: runRefresh, child: const Center(child: Text("Home Feed (Double Tap to Refresh)"))),
                const Center(child: Text("Search UI Indexed")),
                GestureDetector(onDoubleTap: runRefresh, child: const Center(child: Text("🎬 Reels Panel Node Active"))),
                const Center(child: Text("Chat Rooms Filtered")),
                ProfileHub(user: user),
              ];

              return Scaffold(
                body: Stack(
                  children: [
                    bodyTabs[_tabIndex],
                    if (_refreshing) Container(color: Colors.black45, child: Center(child: CircularProgressIndicator(valueColor: AlwaysStoppedAnimation(_loadColor)))),
                  ],
                ),
                bottomNavigationBar: BottomNavigationBar(
                  type: BottomNavigationBarType.fixed,
                  backgroundColor: Colors.black,
                  selectedItemColor: const Color(0xFF00E5FF),
                  unselectedItemColor: Colors.white54,
                  currentIndex: _tabIndex,
                  onTap: (i) {
                    if (i == _tabIndex && (i == 0 || i == 2)) {
                      runRefresh();
                    } else {
                      setState(() => _tabIndex = i);
                    }
                  },
                  items: const [
                    BottomNavigationBarItem(icon: Icon(Icons.home), label: ''),
                    BottomNavigationBarItem(icon: Icon(Icons.search), label: ''),
                    BottomNavigationBarItem(icon: Icon(Icons.movie)),
                    BottomNavigationBarItem(icon: Icon(Icons.message)),
                    BottomNavigationBarItem(icon: Icon(Icons.person)),
                  ],
                ),
              );
            }
          }

          class ProfileHub extends StatelessWidget {
            final UserData user;
            const ProfileHub({super.key, required this.user});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  backgroundColor: Colors.black,
                  title: Text(user.username),
                  actions: [
                    IconButton(
                      icon: const Icon(Icons.info_outline),
                      onPressed: () {
                        showModalBottomSheet(
                          context: context,
                          backgroundColor: Colors.grey[950],
                          builder: (c) => Padding(
                            padding: const EdgeInsets.all(24.0),
                            child: Column(
                              mainAxisSize: MainAxisSize.min,
                              crossAxisAlignment: CrossAxisAlignment.start,
                              children: [
                                const Text("⚠️ ACCOUNT DIAGNOSTICS", style: TextStyle(color: Colors.redAccent, fontWeight: FontWeight.bold)),
                                const SizedBox(height: 15),
                                Text("Username: ${user.username}"),
                                Text("Region: ${user.region}"),
                                Text("Created On: ${user.created}"),
                              ],
                            ),
                          ),
                        );
                      },
                    )
                  ],
                ),
                body: Center(
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      const CircleAvatar(radius: 40, backgroundColor: Color(0xFF00E5FF), child: Icon(Icons.person, size: 40, color: Colors.black)),
                      const SizedBox(height: 20),
                      Text("Premium Status: ${user.isPremium ? 'Active' : 'None'}"),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

          # Compile Standalone Final Release Package
          flutter build apk --release --no-tree-shake-icons

      - name: Publish Compiled Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Levo-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
