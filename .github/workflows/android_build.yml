name: Android Production Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: actions/setup-flutter@v3
        with:
          channel: 'stable'

      - name: Force Recreate Production Workspace
        run: |
          rm -rf ./*
          flutter create --org com.levoteam --project-name levo_premium_app --platforms=android .
          
      - name: Overwrite Main Dart File
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';

          void main() {
            runApp(const LevoApp());
          }

          class LevoApp extends StatelessWidget {
            const LevoApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Levo Premium App',
                theme: ThemeData.dark().copyWith(
                  scaffoldBackgroundColor: const Color(0xFF000000),
                  primaryColor: const Color(0xFF00E5FF),
                ),
                home: const LevoLoginScreen(),
              );
            }
          }

          class LevoLoginScreen extends StatefulWidget {
            const LevoLoginScreen({super.key});

            @override
            Widget build(BuildContext context) {
              return const Scaffold(
                backgroundColor: Colors.black,
                body: LevoLoginBody(),
              );
            }
          }

          class LevoLoginBody extends StatefulWidget {
            const LevoLoginBody({super.key});

            @override
            State<LevoLoginBody> createState() => _LevoLoginBodyState();
          }

          class _LevoLoginBodyState extends State<LevoLoginBody> {
            final _usernameController = TextEditingController();
            final _passwordController = TextEditingController();
            bool _isPasswordObscured = true;

            @override
            Widget build(BuildContext context) {
              return Center(
                child: Padding(
                  padding: const EdgeInsets.symmetric(horizontal: 30.0),
                  child: Container(
                    padding: const EdgeInsets.all(24),
                    decoration: BoxDecoration(
                      border: Border.all(color: const Color(0xFF00E5FF).withOpacity(0.4), width: 2),
                      borderRadius: BorderRadius.circular(20),
                    ),
                    child: Column(
                      mainAxisSize: MainAxisSize.min,
                      children: [
                        const Text(
                          'LEVO LOGIN',
                          style: TextStyle(
                            color: Color(0xFF00E5FF),
                            fontSize: 26,
                            fontWeight: FontWeight.bold,
                            letterSpacing: 1.5,
                          ),
                        ),
                        const SizedBox(height: 30),
                        TextField(
                          controller: _usernameController,
                          style: const TextStyle(color: Colors.white),
                          decoration: const InputDecoration(
                            labelText: 'Username or Phone',
                            labelStyle: TextStyle(color: Colors.white70),
                            enabledBorder: UnderlineInputBorder(borderSide: BorderSide(color: Colors.white38)),
                            focusedBorder: UnderlineInputBorder(borderSide: BorderSide(color: Color(0xFF00E5FF))),
                          ),
                        ),
                        const SizedBox(height: 20),
                        TextField(
                          controller: _passwordController,
                          obscureText: _isPasswordObscured,
                          style: const TextStyle(color: Colors.white),
                          decoration: InputDecoration(
                            labelText: 'Password',
                            labelStyle: const TextStyle(color: Colors.white70),
                            enabledBorder: const UnderlineInputBorder(borderSide: BorderSide(color: Colors.white38)),
                            focusedBorder: const UnderlineInputBorder(borderSide: BorderSide(color: Color(0xFF00E5FF))),
                            suffixIcon: IconButton(
                              icon: Icon(
                                _isPasswordObscured ? Icons.visibility_off : Icons.visibility,
                                color: const Color(0xFF00E5FF),
                              ),
                              onPressed: () {
                                setState(() {
                                  _isPasswordObscured = !_isPasswordObscured;
                                });
                              },
                            ),
                          ),
                        ),
                        const SizedBox(height: 40),
                        SizedBox(
                          width: double.infinity,
                          height: 50,
                          child: ElevatedButton(
                            style: ElevatedButton.styleFrom(
                              backgroundColor: const Color(0xFF00E5FF),
                              foregroundColor: Colors.black,
                              shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(25)),
                            ),
                            onPressed: () {
                              if (_usernameController.text.isNotEmpty) {
                                Navigator.pushReplacement(
                                  context,
                                  MaterialPageRoute(
                                    builder: (context) => LevoDashboard(username: _usernameController.text),
                                  ),
                                );
                              }
                            },
                            child: const Text('CONTINUE', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 16)),
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }

          class LevoDashboard extends StatefulWidget {
            final String username;
            const LevoDashboard({super.key, required this.username});

            @override
            State<LevoDashboard> createState() => _LevoDashboardState();
          }

          class _LevoDashboardState extends State<LevoDashboard> {
            final List<Map<String, String>> _stories = [
              {'user': 'My Story', 'isMe': 'true'},
              {'user': 'alex_99', 'isMe': 'false'},
              {'user': 'sam_rock', 'isMe': 'false'},
              {'user': 'johndoe', 'isMe': 'false'},
            ];

            void _addNewStory() {
              setState(() {
                _stories.insert(1, {'user': 'levo_user_${_stories.length}', 'isMe': 'false'});
              });
              ScaffoldMessenger.of(context).showSnackBar(
                const SnackBar(content: Text('Story Posted Successfully! 🚀')),
              );
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.black,
                body: SafeArea(
                  child: SingleChildScrollView(
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Padding(
                          padding: EdgeInsets.all(16.0),
                          child: Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            children: [
                              Text("Search Engine & Location Engine Sync Active.", style: TextStyle(color: Colors.white, fontSize: 14)),
                              SizedBox(height: 10),
                              Text("✈ Reel, Photo Post & Live Stream Panel Placeholder", style: TextStyle(color: Colors.white, fontSize: 14)),
                            ],
                          ),
                        ),

                        const Padding(
                          padding: EdgeInsets.symmetric(horizontal: 16.0, vertical: 8),
                          child: Text("Active Rooms & Stories", style: TextStyle(color: Color(0xFF00E5FF), fontWeight: FontWeight.bold)),
                        ),
                        SizedBox(
                          height: 100,
                          child: ListView.builder(
                            scrollDirection: Axis.horizontal,
                            itemCount: _stories.length,
                            itemBuilder: (context, index) {
                              final story = _stories[index];
                              return Padding(
                                padding: const EdgeInsets.symmetric(horizontal: 10.0),
                                child: Column(
                                  children: [
                                    Stack(
                                      children: [
                                        Container(
                                          width: 60,
                                          height: 60,
                                          decoration: BoxDecoration(
                                            shape: BoxShape.circle,
                                            border: Border.all(
                                              color: story['isMe'] == 'true' ? Colors.white38 : const Color(0xFF00E5FF),
                                              width: 2,
                                            ),
                                          ),
                                          child: const CircleAvatar(
                                            backgroundColor: Colors.white10,
                                            child: Icon(Icons.person, color: Colors.white, size: 30),
                                          ),
                                        ),
                                        if (story['isMe'] == 'true')
                                          Positioned(
                                            bottom: 0,
                                            right: 0,
                                            child: GestureDetector(
                                              onTap: _addNewStory,
                                              child: const CircleAvatar(
                                                radius: 9,
                                                backgroundColor: Color(0xFF00E5FF),
                                                child: Icon(Icons.add, size: 14, color: Colors.black),
                                              ),
                                            ),
                                          ),
                                      ],
                                    ),
                                    const SizedBox(height: 4),
                                    Text(story['user']!, style: const TextStyle(fontSize: 11, color: Colors.white70)),
                                  ],
                                ),
                              );
                            },
                          ),
                        ),

                        const Divider(color: Colors.white24, thickness: 1),

                        Padding(
                          padding: const EdgeInsets.all(16.0),
                          child: InkWell(
                            onTap: () {
                              Navigator.push(
                                context,
                                MaterialPageRoute(builder: (context) => LevoLiveScreen(username: widget.username)),
                              );
                            },
                            child: Container(
                              padding: const EdgeInsets.all(16),
                              decoration: BoxDecoration(
                                border: Border.all(color: Colors.redAccent.withOpacity(0.5)),
                                borderRadius: BorderRadius.circular(12),
                              ),
                              child: const Row(
                                mainAxisAlignment: MainAxisAlignment.spaceBetween,
                                children: [
                                  Text("📡 Tap to Initialize Live Room", style: TextStyle(color: Colors.redAccent, fontWeight: FontWeight.bold)),
                                  Icon(Icons.arrow_forward_ios, color: Colors.redAccent, size: 16),
                                ],
                              ),
                            ),
                          ),
                        ),

                        Center(
                          child: Padding(
                            padding: const EdgeInsets.symmetric(vertical: 20.0),
                            child: Column(
                              children: [
                                const Icon(Icons.play_arrow, size: 40, color: Colors.white30),
                                Text("Logged User: ${widget.username}", style: const TextStyle(color: Colors.white, fontSize: 14)),
                              ],
                            ),
                          ),
                        ),

                        Center(
                          child: ElevatedButton(
                            style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFFFF3D00)),
                            onPressed: () {
                              Navigator.pushReplacement(context, MaterialPageRoute(builder: (context) => const LevoLoginScreen()));
                            },
                            child: const Text("Logout Session", style: TextStyle(color: Colors.white)),
                          ),
                        )
                      ],
                    ),
                  ),
                ),
              );
            }
          }

          class LevoLiveScreen extends StatelessWidget {
            final String username;
            const LevoLiveScreen({super.key, required this.username});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Stack(
                  children: [
                    Container(color: Colors.black, child: const Center(child: Icon(Icons.videocam, size: 100, color: Colors.white12))),
                    Positioned(
                      top: 40,
                      left: 20,
                      child: Container(
                        padding: const EdgeInsets.symmetric(horizontal: 10, vertical: 5),
                        decoration: BoxDecoration(color: Colors.red, borderRadius: BorderRadius.circular(4)),
                        child: const Text("LIVE", style: TextStyle(fontWeight: FontWeight.bold)),
                      ),
                    ),
                    Positioned(bottom: 50, left: 0, right: 0, child: Center(
                      child: IconButton(
                        icon: const CircleAvatar(radius: 30, backgroundColor: Colors.white, child: Icon(Icons.call_end, color: Colors.red)),
                        onPressed: () => Navigator.pop(context),
                      ),
                    ))
                  ],
                ),
              );
            }
          }
          EOF

      - name: Build Standalone APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Levo-Premium-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
