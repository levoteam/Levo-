name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Configure Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Initialize Flutter Runtime
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Direct Workspace Generator
        run: |
          rm -rf ./*
          flutter create --org com.levoteam --project-name levo --platforms=android .
          
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';

          void main() => runApp(const LevoEngine());

          class LevoEngine extends StatefulWidget {
            const LevoEngine({super.key});
            @override
            State<LevoEngine> createState() => _LevoEngineState();
          }

          class _LevoEngineState extends State<LevoEngine> {
            int currentThemeIndex = 0;
            final List<ThemeData> availableThemes = [
              ThemeData.dark().copyWith(scaffoldBackgroundColor: Colors.black, primaryColor: const Color(0xFF00E5FF)),
              ThemeData.dark().copyWith(scaffoldBackgroundColor: const Color(0xFF0D1B2A), primaryColor: Colors.purpleAccent),
              ThemeData.dark().copyWith(scaffoldBackgroundColor: const Color(0xFF1A1A2E), primaryColor: Colors.redAccent),
              ThemeData.dark().copyWith(scaffoldBackgroundColor: const Color(0xFF0B2545), primaryColor: Colors.emeraldAccent),
            ];

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'levo',
                theme: availableThemes[currentThemeIndex],
                home: LevoCorePage(
                  onThemeChanged: (index) => setState(() => currentThemeIndex = index),
                ),
              );
            }
          }

          class LevoCorePage extends StatefulWidget {
            final Function(int) onThemeChanged;
            const LevoCorePage({super.key, required this.onThemeChanged});
            @override
            State<LevoCorePage> createState() => _LevoCorePageState();
          }

          class _LevoCorePageState extends State<LevoCorePage> {
            int _tabIndex = 0;
            bool _refreshing = false;
            int _colorCycle = 0;
            final List<Color> _loaderColors = [Colors.cyan, Colors.purpleAccent, Colors.redAccent, Colors.greenAccent];

            void triggerGlobalRefresh() async {
              setState(() {
                _refreshing = true;
                _colorCycle = (_colorCycle + 1) % _loaderColors.length;
              });
              await Future.delayed(const Duration(milliseconds: 1100));
              if (mounted) setState(() => _refreshing = false);
            }

            @override
            Widget build(BuildContext context) {
              final List<Widget> bodyTabs = [
                GestureDetector(onDoubleTap: triggerGlobalRefresh, child: const Center(child: Text("🏠 Home Feed\n(Double-Tap to Logo Spin/Refresh)", textAlign: TextAlign.center))),
                SearchInterface(),
                GestureDetector(onDoubleTap: triggerGlobalRefresh, child: const Center(child: Text("🎬 Reels Stream Panel\n(Double-Tap to Refresh)", textAlign: TextAlign.center))),
                ChatInterface(onRefreshRequested: triggerGlobalRefresh),
                ProfileInterface(onThemeSelect: widget.onThemeChanged),
              ];

              return Scaffold(
                body: Stack(
                  children: [
                    bodyTabs[_tabIndex],
                    if (_refreshing)
                      Container(
                        color: Colors.black70,
                        child: Center(
                          child: RotationTransition(
                            turns: const AlwaysStoppedAnimation(45 / 360),
                            child: CircularProgressIndicator(valueColor: AlwaysStoppedAnimation(_loaderColors[_colorCycle]), strokeWidth: 3),
                          ),
                        ),
                      ),
                  ],
                ),
                bottomNavigationBar: BottomNavigationBar(
                  type: BottomNavigationBarType.fixed,
                  backgroundColor: Colors.black,
                  selectedItemColor: const Color(0xFF00E5FF),
                  unselectedItemColor: Colors.white54,
                  currentIndex: _tabIndex,
                  onTap: (i) {
                    if (i == _tabIndex && (i == 0 || i == 2)) {
                      triggerGlobalRefresh();
                    } else {
                      setState(() => _tabIndex = i);
                    }
                  },
                  items: const [
                    BottomNavigationBarItem(icon: Icon(Icons.home), label: ''),
                    BottomNavigationBarItem(icon: Icon(Icons.search), label: ''),
                    BottomNavigationBarItem(icon: Icon(Icons.movie_filter_outlined), label: ''),
                    BottomNavigationBarItem(icon: Icon(Icons.messenger_outline_rounded), label: ''),
                    BottomNavigationBarItem(icon: Icon(Icons.person_outline_rounded), label: ''),
                  ],
                ),
              );
            }
          }

          class SearchInterface extends StatefulWidget {
            @override
            State<SearchInterface> createState() => _SearchInterfaceState();
          }

          class _SearchInterfaceState extends State<SearchInterface> {
            final List<String> database = ["alex_99", "sam_rock", "levo_editor", "vfx_matrix"];
            List<String> dynamicSuggestions = [];

            void searchIndex(String q) {
              setState(() {
                dynamicSuggestions = q.isEmpty ? [] : database.where((u) => u.contains(q.toLowerCase())).toList();
              });
            }

            @override
            Widget build(BuildContext context) {
              return SafeArea(
                child: Padding(
                  padding: const EdgeInsets.all(16.0),
                  child: Column(
                    children: [
                      TextField(
                        onChanged: searchIndex,
                        decoration: InputDecoration(
                          hintText: "Search accounts...",
                          prefixIcon: const Icon(Icons.search, color: Color(0xFF00E5FF)),
                          filled: true,
                          fillColor: Colors.white10,
                          border: OutlineInputBorder(borderRadius: BorderRadius.circular(12), borderSide: BorderSide.none),
                        ),
                      ),
                      Expanded(
                        child: ListView.builder(
                          itemCount: dynamicSuggestions.length,
                          itemBuilder: (c, i) => TweenAnimationBuilder<double>(
                            tween: Tween(begin: 0.3, end: 1.0),
                            duration: const Duration(milliseconds: 300),
                            builder: (ctx, opacityVal, child) => Opacity(
                              opacity: opacityVal,
                              child: ListTile(
                                leading: const CircleAvatar(backgroundColor: Colors.white10, child: Icon(Icons.person)),
                                title: Text(dynamicSuggestions[i]),
                                trailing: const Text("See All", style: TextStyle(color: Color(0xFF00E5FF), fontSize: 12)),
                              ),
                            ),
                          ),
                        ),
                      )
                    ],
                  ),
                ),
              );
            }
          }

          class ChatInterface extends StatelessWidget {
            final VoidCallback onRefreshRequested;
            const ChatInterface({super.key, required this.onRefreshRequested});

            @override
            Widget build(BuildContext context) {
              return DefaultTabController(
                length: 3,
                child: Scaffold(
                  appBar: AppBar(
                    backgroundColor: Colors.black,
                    title: const Text("Message Feed"),
                    bottom: const TabBar(indicatorColor: Color(0xFF00E5FF), tabs: [Tab(text: "Direct"), Tab(text: "Hidden"), Tab(text: "Requests")]),
                  ),
                  body: TabBarView(
                    children: [
                      GestureDetector(
                        onVerticalDragEnd: (details) => onRefreshRequested(),
                        child: ListView(
                          children: [
                            ListTile(
                              leading: const CircleAvatar(backgroundColor: Colors.white10),
                              title: const Text("alex_99"),
                              subtitle: const Text("Hold message node for system constraints"),
                              onLongPress: () {
                                showModalBottomSheet(
                                  context: context,
                                  backgroundColor: Colors.grey[950],
                                  builder: (c) => Wrap(
                                    children: const [
                                      ListTile(leading: Icon(Icons.lock_outline), title: Text("Lock Chat")),
                                      ListTile(leading: Icon(Icons.visibility_off_outlined), title: Text("Hide Chat")),
                                      ListTile(leading: Icon(Icons.delete_sweep_outlined, color: Colors.redAccent), title: Text("Delete for Everyone")),
                                    ],
                                  ),
                                );
                              },
                            )
                          ],
                        ),
                      ),
                      const Center(child: Text("🔒 Locked/Hidden Node View Stack")),
                      const Center(child: Text("📩 Request Streams Queue Empty")),
                    ],
                  ),
                ),
              );
            }
          }

          class ProfileInterface extends StatefulWidget {
            final Function(int) onThemeSelect;
            const ProfileInterface({super.key, required this.onThemeSelect});
            @override
            State<ProfileInterface> createState() => _ProfileInterfaceState();
          }

          class _ProfileInterfaceState extends State<ProfileInterface> {
            int targetedPostIndex = -1;

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  backgroundColor: Colors.black,
                  title: const Text("levo_user"),
                  actions: [
                    IconButton(
                      icon: const Icon(Icons.info_outline),
                      onPressed: () {
                        showModalBottomSheet(
                          context: context,
                          backgroundColor: Colors.grey[950],
                          builder: (c) => Padding(
                            padding: const EdgeInsets.all(24.0),
                            child: Column(
                              mainAxisSize: MainAxisSize.min,
                              crossAxisAlignment: CrossAxisAlignment.start,
                              children: const [
                                Text("⚠️ REPORT DATA SOURCE SUMMARY", style: TextStyle(color: Colors.redAccent, fontWeight: FontWeight.bold)),
                                SizedBox(height: 15),
                                Text("Target ID: user_node_268"),
                                Text("Region Code: IN/Asia Only"),
                                Text("System Creation Timestamp: 26-06-2026"),
                              ],
                            ),
                          ),
                        );
                      },
                    )
                  ],
                ),
                body: SingleChildScrollView(
                  child: Column(
                    children: [
                      const SizedBox(height: 20),
                      const CircleAvatar(radius: 40, backgroundColor: Color(0xFF00E5FF), child: Icon(Icons.person, size: 40, color: Colors.black)),
                      const SizedBox(height: 15),
                      Row(
                        mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                        children: const [
                          Text("Edit Profile"),
                          Text("Share Profile"),
                          Text("Copy Link"),
                          Text("QR Code"),
                        ],
                      ),
                      const Divider(height: 40, color: Colors.white24),
                      const Text("Select Engine Variant Theme (Premium)", style: TextStyle(color: Color(0xFF00E5FF), fontSize: 12)),
                      const SizedBox(height: 10),
                      Row(
                        mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                        children: List.generate(4, (index) => GestureDetector(
                          onTap: () => widget.onThemeSelect(index),
                          child: CircleAvatar(radius: 15, backgroundColor: index == 0 ? Colors.cyan : index == 1 ? Colors.purple : index == 2 ? Colors.red : Colors.emerald),
                        )),
                      ),
                      const Divider(height: 40, color: Colors.white24),
                      GridView.builder(
                        shrinkWrap: true,
                        physics: const NeverScrollableScrollPhysics(),
                        itemCount: 6,
                        gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(crossAxisCount: 3, crossAxisSpacing: 4, mainAxisSpacing: 4),
                        itemBuilder: (c, i) => GestureDetector(
                          onTap: () => setState(() => targetedPostIndex = (targetedPostIndex == i) ? -1 : i),
                          child: AnimatedContainer(
                            duration: const Duration(milliseconds: 200),
                            curve: Curves.easeOut,
                            transform: Matrix4.identity()..scale(targetedPostIndex == i ? 1.08 : 1.0),
                            decoration: BoxDecoration(
                              color: Colors.white10,
                              border: Border.all(color: targetedPostIndex == i ? const Color(0xFF00E5FF) : Colors.transparent, width: 2),
                            ),
                            child: Center(child: Text("Post Element #$i", style: const TextStyle(fontSize: 11))),
                          ),
                        ),
                      )
                    ],
                  ),
                ),
              );
            }
          }
          EOF

      - name: Build Arm64 Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Export Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: levo-standalone-build
          path: build/app/outputs/flutter-apk/app-release.apk
          
